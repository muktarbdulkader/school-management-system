  # ==================== AUTH ENHANCEMENTS ====================
  /api/auth/otp/request/:
    post:
      tags:
        - Auth Enhancements
      summary: Request OTP code
      description: Request a one-time password for login, password reset, or verification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - purpose
              properties:
                email:
                  type: string
                  format: email
                purpose:
                  type: string
                  enum: [login, password_reset, email_verification, 2fa]
            example:
              email: "user@school.com"
              purpose: "login"
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/auth/otp/verify/:
    post:
      tags:
        - Auth Enhancements
      summary: Verify OTP code
      description: Verify the OTP code sent to user's email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
                - purpose
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                purpose:
                  type: string
            example:
              email: "user@school.com"
              code: "123456"
              purpose: "login"
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/auth/two-factor/enable/:
    post:
      tags:
        - Auth Enhancements
      summary: Enable 2FA
      description: Enable two-factor authentication for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - method
              properties:
                method:
                  type: string
                  enum: [sms, email, app]
                phone_number:
                  type: string
                  description: Required for SMS method
            example:
              method: "email"
      responses:
        '200':
          description: 2FA enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      backup_codes:
                        type: array
                        items:
                          type: string
  
  /api/auth/two-factor/disable/:
    post:
      tags:
        - Auth Enhancements
      summary: Disable 2FA
      description: Disable two-factor authentication for current user
      responses:
        '200':
          description: 2FA disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/auth/two-factor/status/:
    get:
      tags:
        - Auth Enhancements
      summary: Get 2FA status
      description: Check if 2FA is enabled for current user
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      is_enabled:
                        type: boolean
                      method:
                        type: string
  
  /api/auth/password-reset/request/:
    post:
      tags:
        - Auth Enhancements
      summary: Request password reset
      description: Request password reset code via email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
            example:
              email: "user@school.com"
      responses:
        '200':
          description: Reset code sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/auth/password-reset/confirm/:
    post:
      tags:
        - Auth Enhancements
      summary: Confirm password reset
      description: Reset password using OTP code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
                - new_password
                - confirm_password
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                new_password:
                  type: string
                  format: password
                  minLength: 8
                confirm_password:
                  type: string
                  format: password
            example:
              email: "user@school.com"
              code: "123456"
              new_password: "newpassword123"
              confirm_password: "newpassword123"
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid code or passwords don't match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/auth/login-attempts/my-attempts/:
    get:
      tags:
        - Auth Enhancements
      summary: Get my login attempts
      description: View login attempt history for current user
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  # ==================== RESOURCE REQUESTS ====================
  /api/resources/resource-requests/:
    get:
      tags:
        - Resource Requests
      summary: List resource requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, completed, cancelled]
        - name: request_type
          in: query
          schema:
            type: string
            enum: [supplies, exam_duplication, equipment, maintenance, other]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - name: department
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Resource Requests
      summary: Create resource request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_type
                - title
                - description
              properties:
                request_type:
                  type: string
                  enum: [supplies, exam_duplication, equipment, maintenance, other]
                title:
                  type: string
                description:
                  type: string
                quantity:
                  type: integer
                  default: 1
                priority:
                  type: string
                  enum: [low, medium, high, urgent]
                  default: medium
                department:
                  type: string
                estimated_cost:
                  type: number
                  format: float
                needed_by:
                  type: string
                  format: date
                notes:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      item_name:
                        type: string
                      description:
                        type: string
                      quantity:
                        type: integer
                      unit:
                        type: string
                      estimated_unit_cost:
                        type: number
            example:
              request_type: "supplies"
              title: "Office Supplies for Math Department"
              description: "Need markers, erasers, and notebooks"
              quantity: 1
              priority: "medium"
              department: "Mathematics"
              estimated_cost: 150.00
              needed_by: "2024-03-20"
              items:
                - item_name: "Whiteboard Markers"
                  quantity: 20
                  unit: "pieces"
                  estimated_unit_cost: 2.50
                - item_name: "Erasers"
                  quantity: 10
                  unit: "pieces"
                  estimated_unit_cost: 1.00
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/resources/resource-requests/{id}/:
    get:
      tags:
        - Resource Requests
      summary: Get resource request details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    put:
      tags:
        - Resource Requests
      summary: Update resource request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    delete:
      tags:
        - Resource Requests
      summary: Delete resource request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
  
