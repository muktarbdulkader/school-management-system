openapi: 3.0.3
info:
  title: School Management System - Complete API
  description: |
    Complete API documentation for School Management System with all endpoints.
    
    ## Features
    - Authentication & Authorization (JWT)
    - User Management (Students, Teachers, Parents, Admins)
    - Academic Management (Classes, Subjects, Terms)
    - Schedule & Attendance
    - Communication (Chat, Announcements, Meetings)
    - Teacher Performance Tracking
    - Task Management
    - Data Export (PDF, Excel, CSV)
    - Library Management
    - Leave Requests
    - Authentication Enhancements (OTP, 2FA)
    - Resource Requests
    
    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your_jwt_token>
    ```
  version: 1.0.0
  contact:
    name: API Support
    email: support@schoolsystem.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000
    description: Development server
  - url: https://api.schoolsystem.com
    description: Production server

tags:
  - name: Authentication
    description: Login, register, token management
  - name: Users
    description: User CRUD operations
  - name: Students
    description: Student management and profiles
  - name: Teachers
    description: Teacher management and profiles
  - name: Parents
    description: Parent management and relationships
  - name: Academics
    description: Classes, subjects, terms, sections
  - name: Schedule
    description: Timetables, slots, attendance
  - name: Exams
    description: Exam management and results
  - name: Communication
    description: Chat, announcements, meetings
  - name: Blogs
    description: School blog and PR
  - name: Teacher Performance
    description: Performance tracking and ratings
  - name: Task Management
    description: Tasks, assignments, delegation
  - name: Data Export
    description: PDF, Excel, CSV exports
  - name: Library Management
    description: Books, borrowing, members
  - name: Leave Requests
    description: Leave request workflow
  - name: Auth Enhancements
    description: OTP, 2FA, password reset
  - name: Resource Requests
    description: Supply and equipment requests

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint
  
  schemas:
    # Common Response Schemas
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation successful"
        status:
          type: integer
          example: 200
        data:
          type: object
          description: Response data (varies by endpoint)
    
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Error message"
        status:
          type: integer
          example: 400
    
    # Authentication Schemas
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "teacher@school.com"
        password:
          type: string
          format: password
          example: "password123"
    
    LoginResponse:
      type: object
      properties:
        access:
          type: string
          example: "eyJ0eXAiOiJKV1QiLCJhbGc..."
        refresh:
          type: string
          example: "eyJ0eXAiOiJKV1QiLCJhbGc..."
        user:
          $ref: '#/components/schemas/User'
    
    RegisterRequest:
      type: object
      required:
        - email
        - full_name
        - password
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
        password:
          type: string
          format: password
        role_name:
          type: string
          enum: [student, teacher, parent, admin]
    
    # User Schemas
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        is_active:
          type: boolean
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    
    Student:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'
        branch:
          type: object
        grade:
          type: object
        section:
          type: object
        birth_date:
          type: string
          format: date
        gender:
          type: string
        family_status:
          type: string
        health_info:
          type: string
    
    Teacher:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'
        subject_specialties:
          type: string
        rating:
          type: number
          format: float
        attendance_percentage:
          type: number
          format: float
    
    # Task Management Schemas
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [todo, in_progress, done, not_done]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        due_date:
          type: string
          format: date
        created_by:
          type: object
        assigned_to:
          type: object
        created_at:
          type: string
          format: date-time
    
    TaskCreate:
      type: object
      required:
        - title
        - description
      properties:
        title:
          type: string
          example: "Prepare lesson plan"
        description:
          type: string
          example: "Create detailed lesson plan for Math Grade 10"
        priority:
          type: string
          enum: [low, medium, high, urgent]
          example: "high"
        due_date:
          type: string
          format: date
          example: "2024-03-20"
        assigned_to:
          type: string
          format: uuid
    
    # Library Schemas
    Book:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        category:
          type: string
        total_copies:
          type: integer
        available_copies:
          type: integer
        publisher:
          type: string
        published_year:
          type: integer
    
    BookCreate:
      type: object
      required:
        - title
        - author
        - isbn
      properties:
        title:
          type: string
          example: "Introduction to Python"
        author:
          type: string
          example: "John Doe"
        isbn:
          type: string
          example: "978-0-123456-78-9"
        category:
          type: string
          example: "Programming"
        total_copies:
          type: integer
          example: 5
        publisher:
          type: string
        published_year:
          type: integer
          example: 2023
    
    # Leave Request Schemas
    LeaveRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        student_id:
          type: object
        requested_by:
          type: object
        subject_id:
          type: object
        date:
          type: string
          format: date
        reason:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
    
    LeaveRequestCreate:
      type: object
      required:
        - student_id
        - date
        - reason
      properties:
        student_id:
          type: string
          format: uuid
        subject_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
          example: "2024-03-15"
        reason:
          type: string
          example: "Medical appointment"
    
    # Resource Request Schemas
    ResourceRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        request_type:
          type: string
          enum: [supplies, exam_duplication, equipment, maintenance, other]
        title:
          type: string
        description:
          type: string
        quantity:
          type: integer
        priority:
          type: string
          enum: [low, medium, high, urgent]
        status:
          type: string
          enum: [pending, approved, rejected, completed, cancelled]
        requested_by:
          type: object
        department:
          type: string
        estimated_cost:
          type: number
        needed_by:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

security:
  - bearerAuth: []

paths:
  # ==================== AUTHENTICATION ====================
  /api/users/login/:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and receive JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              teacher:
                summary: Teacher login
                value:
                  email: "teacher@school.com"
                  password: "password123"
              student:
                summary: Student login
                value:
                  email: "student@school.com"
                  password: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/users/register/:
    post:
      tags:
        - Authentication
      summary: User registration
      description: Register a new user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: "newuser@school.com"
              full_name: "John Doe"
              password: "securepass123"
              role_name: "teacher"
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/users/token/refresh/:
    post:
      tags:
        - Authentication
      summary: Refresh JWT token
      description: Get new access token using refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
            example:
              refresh: "eyJ0eXAiOiJKV1QiLCJhbGc..."
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string

  
  # ==================== USERS ====================
  /api/users/users/:
    get:
      tags:
        - Users
      summary: List all users
      description: Get paginated list of users with optional filters
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [student, teacher, parent, admin]
        - name: is_active
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          description: Search by name or email
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Users
      summary: Create new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/users/users/{id}/:
    get:
      tags:
        - Users
      summary: Get user details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    put:
      tags:
        - Users
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                email:
                  type: string
                is_active:
                  type: boolean
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    delete:
      tags:
        - Users
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
  
  /api/users/profile/:
    get:
      tags:
        - Users
      summary: Get current user profile
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    put:
      tags:
        - Users
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                bio:
                  type: string
                profile_picture:
                  type: string
                  format: binary
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  # ==================== STUDENTS ====================
  /api/students/students/:
    get:
      tags:
        - Students
      summary: List all students
      parameters:
        - name: grade
          in: query
          schema:
            type: string
            format: uuid
        - name: section
          in: query
          schema:
            type: string
            format: uuid
        - name: branch
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Students
      summary: Create new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - branch_id
                - grade_id
              properties:
                user_id:
                  type: string
                  format: uuid
                branch_id:
                  type: string
                  format: uuid
                grade_id:
                  type: string
                  format: uuid
                section_id:
                  type: string
                  format: uuid
                birth_date:
                  type: string
                  format: date
                gender:
                  type: string
                  enum: [male, female]
                family_status:
                  type: string
                health_info:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/students/students/{id}/:
    get:
      tags:
        - Students
      summary: Get student details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    put:
      tags:
        - Students
      summary: Update student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/students/behavior-ratings/:
    get:
      tags:
        - Students
      summary: List behavior ratings
      parameters:
        - name: student_id
          in: query
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Students
      summary: Create behavior rating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - student_id
                - rating
              properties:
                student_id:
                  type: string
                  format: uuid
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
                date:
                  type: string
                  format: date
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  
  # ==================== TEACHERS ====================
  /api/teachers/teachers/:
    get:
      tags:
        - Teachers
      summary: List all teachers
      parameters:
        - name: subject
          in: query
          schema:
            type: string
        - name: rating_min
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Teachers
      summary: Create new teacher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
                  format: uuid
                subject_specialties:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/teachers/teachers/{id}/:
    get:
      tags:
        - Teachers
      summary: Get teacher details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  # ==================== ACADEMICS ====================
  /api/academics/classes/:
    get:
      tags:
        - Academics
      summary: List all classes
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Academics
      summary: Create new class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                grade:
                  type: string
                branch_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/academics/subjects/:
    get:
      tags:
        - Academics
      summary: List all subjects
      parameters:
        - name: course_type
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Academics
      summary: Create new subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
                course_type_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/academics/terms/:
    get:
      tags:
        - Academics
      summary: List all terms
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Academics
      summary: Create new term
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  # ==================== SCHEDULE & ATTENDANCE ====================
  /api/schedule/attendance/:
    get:
      tags:
        - Schedule
      summary: List attendance records
      parameters:
        - name: student_id
          in: query
          schema:
            type: string
            format: uuid
        - name: subject_id
          in: query
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
            enum: [Present, Late, Absent, Excused]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Schedule
      summary: Mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - student_id
                - subject_id
                - date
                - status
              properties:
                student_id:
                  type: string
                  format: uuid
                subject_id:
                  type: string
                  format: uuid
                date:
                  type: string
                  format: date
                status:
                  type: string
                  enum: [Present, Late, Absent, Excused]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  /api/schedule/class-schedule/:
    get:
      tags:
        - Schedule
      summary: Get class schedule
      parameters:
        - name: class_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: section_id
          in: query
          schema:
            type: string
            format: uuid
        - name: day_of_week
          in: query
          schema:
            type: string
            enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags:
        - Schedule
      summary: Create schedule slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                class_id:
                  type: string
                  format: uuid
                section_id:
                  type: string
                  format: uuid
                subject_id:
                  type: string
                  format: uuid
                teacher_id:
                  type: string
                  format: uuid
                day_of_week:
                  type: string
                start_time:
                  type: string
                  format: time
                end_time:
                  type: string
                  format: time
                period_number:
                  type: integer
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  
  # ==================== EXAMS ====================
  /api/schedule/exams/:
    get:
      tags:
        - Exams
      summary: List all exams
      parameters:
        - name: term_id
          in: query
          schema:
            type: string
            format: uuid
        - name: class_id
          in: query
          schema:
            type: string
            format: uuid
        - name: exam_type
          in: query
          schema:
            type: string
            enum: [final, mid_term, unit_test, diagnostic_test, other]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
