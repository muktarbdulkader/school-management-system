services:
  - type: web
    name: school-management-system
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "chmod +x start.sh && ./start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: DJANGO_SETTINGS_MODULE
        value: mald_sms.settings
      - key: RENDER
        value: "true"
    plan: starter  # 512MB RAM - use minimal workers
