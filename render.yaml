services:
  - type: web
    name: school-management-backend
    env: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "bash -c 'python manage.py migrate --noinput && python manage.py create_roles && python manage.py create_users && gunicorn mald_sms.wsgi:application --config gunicorn_config.py'"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_SETTINGS_MODULE
        value: mald_sms.settings
      # Add other vars like DATABASE_URL as secrets in the Dashboard
